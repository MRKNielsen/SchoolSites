<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- ============================================================
     STARTER DECK — copy this file into your unit's folder.
     1. Fix the ../.. asset paths for your folder depth
     2. Set the theme class on <body>
     3. Replace the placeholder slides
     Component reference: styleguide/deck-demo.html
     ============================================================ -->
<title>UNIT CODE · Lesson title</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@500;700;800&family=Source+Sans+3:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/tokens.css">
<link rel="stylesheet" href="../assets/css/deck.css">
</head>
<body class="deck-page theme-methods">

<div class="progress"></div>
<div class="lessontag">UNIT · Lesson</div>
<a class="homebtn" href="index.html">⌂ Unit home</a>

<main class="deck">

  <section class="slide title-slide active">
    <p class="eyebrow">Subject <b>·</b> Unit</p>
    <h1>Lesson title</h1>
    <p class="subtitle">One-line description.</p>
    <div class="head-meta">
      <span class="pill">Success criterion 1</span>
      <span class="pill">Success criterion 2</span>
    </div>
    <p class="start-hint">Press <span class="key">→</span> to begin.</p>
  </section>

  <section class="slide">
    <p class="eyebrow">Topic <b>·</b> subtopic</p>
    <h2><span class="phase-tag ido">I do</span> Worked example</h2>
    <div class="cols">
      <div>
        <div class="box question"><span class="lbl">Question</span><p>…</p></div>
        <ol class="steps" id="steps1">
          <li><span class="stepno">1</span> …</li>
          <li class="ans"><span class="stepno">✓</span> …</li>
        </ol>
        <button class="reveal-btn" data-target="#steps1">Show working</button>
      </div>
      <div>
        <div class="box key"><span class="lbl">Key idea</span><p>…</p></div>
      </div>
    </div>
  </section>

  <section class="slide exit-slide">
    <div class="exit-wrap">
      <p class="eyebrow">Exit ticket</p>
      <h1>Before you go…</h1>
      <ol>
        <li>…</li>
      </ol>
    </div>
  </section>

</main>

<div class="keyhint"><span class="key">←</span> <span class="key">→</span> navigate · <span class="key">R</span> reveal step</div>
<div class="chrome">
  <button class="navbtn" data-nav="prev" aria-label="Previous slide">←</button>
  <span class="counter">1 / 3</span>
  <button class="navbtn" data-nav="next" aria-label="Next slide">→</button>
</div>

<script src="../assets/js/deck.js" defer></script>
</body>
</html>

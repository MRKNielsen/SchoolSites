<!DOCTYPE html>

<head>

<title>Chapter 6 — Trigonometry | 10 Methods</title>
<style>

    --opp:#c0392b; --adj:#2266aa; --hyp:#1e8449; --gold:#b7791f; --rev:#2e7d32; --test:#c05621;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--ink);overflow:hidden}
  /* ===== MENU ===== */
  #menu{position:fixed;inset:0;overflow-y:auto;background:var(--bg);padding:34px 46px;z-index:50}
  #menu h1{color:var(--navy);font-size:2.1rem}
  #menu .sub{color:#555;margin:6px 0 22px;font-size:1.02rem}
  .wk{margin-bottom:20px}
  .wk h2{font-size:1.05rem;color:var(--navy);border-bottom:2px solid var(--navy);padding-bottom:4px;margin-bottom:10px}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px}
  .card{background:var(--card);border:1px solid #dde4ec;border-left:6px solid var(--navy);border-radius:8px;
        padding:12px 14px;cursor:pointer;transition:.15s}
  .card:hover{transform:translateY(-2px);box-shadow:0 4px 10px rgba(0,0,0,.12)}
  .card .code{font-weight:700;color:var(--navy);font-size:.95rem}
  .card .nm{font-size:1.02rem;font-weight:600;margin:2px 0}
  .card .vb{font-size:.8rem;color:#666;font-style:italic}
  .card.rev{border-left-color:var(--rev)} .card.test{border-left-color:var(--test)}
  /* ===== STAGE ===== */
  #stage{position:fixed;inset:0;display:none;flex-direction:column}
  #bar{height:6px;background:#dfe6ee}
  #fill{height:100%;background:var(--navy);width:0;transition:width .25s}
  #head{display:flex;justify-content:space-between;align-items:center;padding:10px 26px;background:var(--navy);color:#fff}
  #head .l{font-weight:600;font-size:.95rem}
  #head button{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.4);color:#fff;
               border-radius:6px;padding:4px 12px;cursor:pointer;font-size:.85rem}
  #slide{flex:1;overflow-y:auto;padding:34px 56px;max-width:1150px;margin:0 auto;width:100%}
  #foot{display:flex;justify-content:space-between;align-items:center;padding:8px 26px;color:#667;font-size:.85rem;background:#e9eef4}
  #foot .keys{font-size:.8rem}
  #foot button{background:var(--navy);color:#fff;border:none;border-radius:6px;padding:6px 16px;cursor:pointer;margin-left:6px}
  #foot button.ghost{background:#b9c6d4}
  /* ===== SLIDE CONTENT ===== */
  .stitle{color:var(--navy);font-size:1.9rem;margin-bottom:18px}
  .lesson-title h2{font-size:2.3rem;color:var(--navy)} .lesson-title .code{font-size:1.1rem;color:var(--gold);font-weight:700;letter-spacing:.06em}
  .li-box{background:var(--card);border-left:6px solid var(--gold);border-radius:8px;padding:16px 20px;margin-top:22px}
  .li-box h3{font-size:1rem;color:var(--gold);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
  .li-box li{margin:6px 0 6px 20px;font-size:1.15rem}
  .big{font-size:1.25rem;line-height:1.55}
  table.vocab{width:100%;border-collapse:collapse;background:var(--card);border-radius:8px;overflow:hidden;font-size:1.08rem}
  table.vocab th{background:var(--navy);color:#fff;padding:9px 12px;text-align:left;font-size:.95rem}
  table.vocab td{padding:9px 12px;border-bottom:1px solid #e5ebf2;vertical-align:top}
  table.vocab td.t{font-weight:700;color:var(--navy);white-space:nowrap}
  table.vocab td.s{font-style:italic;color:#777;white-space:nowrap}
  .key{background:var(--card);border:1px solid #dde4ec;border-radius:10px;padding:20px 24px;margin:12px 0;font-size:1.22rem;line-height:1.6}
  .key .kt{font-weight:700;color:var(--navy);display:block;margin-bottom:6px;font-size:1rem;text-transform:uppercase;letter-spacing:.05em}
  .formula{background:#eef3fa;border:2px solid var(--navy);border-radius:10px;padding:14px 22px;display:inline-block;
           font-size:1.5rem;margin:10px 8px 4px 0;font-family:Georgia,serif}
  .q{background:#fff8e7;border-left:6px solid var(--gold);border-radius:8px;padding:16px 20px;font-size:1.25rem;margin-bottom:14px}
  .q .tag{font-size:.85rem;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:6px}
  .step{background:var(--card);border:1px solid #dde4ec;border-radius:8px;padding:12px 18px;margin:8px 0;font-size:1.18rem;display:flex;gap:14px;align-items:flex-start}
  .step .n{background:var(--navy);color:#fff;border-radius:50%;min-width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.95rem}
  .ans{background:#e8f5e9;border-left:6px solid var(--hyp);border-radius:8px;padding:14px 20px;font-size:1.22rem;margin:10px 0}
  .hint{background:#f0f4ff;border-left:6px solid var(--adj);border-radius:8px;padding:12px 18px;font-size:1.1rem;margin:8px 0;font-style:italic}
  .frame{background:var(--card);border:2px dashed var(--adj);border-radius:8px;padding:12px 18px;margin:8px 0;font-size:1.2rem}
  .frame b{color:var(--adj)}
  .exset{background:var(--card);border-radius:10px;border:1px solid #dde4ec;padding:22px 26px;font-size:1.2rem}
  .exset h3{color:var(--navy);margin-bottom:10px}
  .exset li{margin:8px 0 8px 22px}
  .pill{display:inline-block;background:#eef3fa;border:1px solid var(--adj);color:var(--adj);border-radius:20px;padding:2px 12px;font-size:.9rem;font-weight:600;margin:2px}
  .frag{visibility:hidden} .frag.on{visibility:visible;animation:up .3s}
  @keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .cols{display:flex;gap:26px;flex-wrap:wrap;align-items:flex-start}
  .cols>div{flex:1;min-width:300px}
  .opp{color:var(--opp);font-weight:700}.adj{color:var(--adj);font-weight:700}.hyp{color:var(--hyp);font-weight:700}
  .fr{display:inline-flex;flex-direction:column;text-align:center;vertical-align:middle;margin:0 3px}
  .fr .nu{border-bottom:2px solid currentColor;padding:0 6px}
  .fr .de{padding:0 6px}
  .say{font-size:.85rem;color:#888;font-style:italic}
  .note{font-size:1rem;color:#666;margin-top:10px;font-style:italic}
  svg text{font-family:'Segoe UI',sans-serif}
  .center{text-align:center}
  .chk{width:100%;border-collapse:collapse;background:var(--card);font-size:1.05rem}
  .chk th{background:var(--navy);color:#fff;padding:8px 12px;text-align:left}
  .chk td{padding:8px 12px;border-bottom:1px solid #e5ebf2}
</style>
</head>

 {h:'Key idea — undoing a ratio',b:`<div class="key"><span class="kt">Key idea</span>

  <div class="key"><span class="kt">Labelling</span>Capital letters = angles. Lower-case letters = sides. Side <i>a</i> is <b>opposite</b> angle <i>A</i>.</div>
  <div class="center frag"><span class="formula">${fr('a','sin A')} = ${fr('b','sin B')} = ${fr('c','sin C')}</span></div>
  <div class="key frag"><span class="kt">When?</span>Use it when you know an <b>opposite pair</b> (an angle and its side).</div></div></div>`},
 {h:'Worked example 7',b:`<div class="cols"><div><div class="q"><span class="tag">Worked example</span>In triangle ABC, A = 40°, a = 12 cm and B = 65°. Find b correct to one decimal place.</div></div>
  <div class="center">${G.obl({A:'A 40°',B:'B 65°',C:'C',a:'a = 12 cm',b:'b = ?'})}</div></div>`+steps([
  `<b>Check:</b> we know the pair A = 40° and a = 12 ✔`,
  `<b>Write the rule:</b> ${fr('b','sin 65°')} = ${fr('12','sin 40°')}`,
  `<b>Rearrange:</b> b = ${fr('12 × sin 65°','sin 40°')}`,
  `<b>Calculate:</b> b ≈ <b>16.9 cm</b>`])},
 {h:'Your turn',b:`<div class="cols"><div><div class="q"><span class="tag">Your turn</span>In triangle ABC, A = 42°, a = 10 and b = 13. Find angle B correct to one decimal place.</div></div>
  <div class="center">${G.obl({A:'A 42°',B:'B = ?',C:'C',a:'a = 10',b:'b = 13'})}</div></div>
  <div class="hint frag">Hint: sin B = ${fr('13 × sin 42°','10')}, then B = sin⁻¹(…)</div>
  <div class="ans frag">✔ sin B ≈ 0.8699 → B ≈ <b>60.5°</b> <span class="say">(your teacher may also mention the obtuse possibility, 119.5°)</span></div>`},
 {h:'',b:exset('6F',['Finding sides first, then finding angles','Always write the opposite <b>pair</b> you are using','Sentence frame: “I know angle ___ and side ___, so I can use the sine rule.”'])}
]},
/* ============ L8 6G ============ */
{code:'6G (10A) · Term 3 Week 2 · Lesson 8',nm:'The cosine rule',menu:['6G','The cosine rule (10A)','included angle, SAS, SSS'],
 slides:[
 title('LESSON 8 — SECTION 6G (10A)','The cosine rule',['recognise when to use the cosine rule (SAS or SSS)','find a third side given two sides and the included angle','find an angle given three sides']),
 {h:'🗣 New words first',b:vocab([
  ['included angle','in-KLOO-ded','the angle <b>between</b> two known sides'],
  ['SAS','side-angle-side','you know 2 sides + the included angle → find the 3rd side'],
  ['SSS','side-side-side','you know 3 sides → find an angle'],
  ['obtuse','ob-TYOOS','an angle bigger than 90° — its cosine is <b>negative</b>']])},
 {h:'Key idea — the cosine rule',b:`<div class="center">
  <span class="formula">c² = a² + b² − 2ab cos C</span>
  <span class="formula">cos C = ${fr('a² + b² − c²','2ab')}</span></div>
  <div class="key frag"><span class="kt">Which rule?</span>Opposite pair known → <b>sine rule</b>. &nbsp; SAS or SSS → <b>cosine rule</b>.</div>
  <div class="key frag"><span class="kt">Careful</span>If cos C is negative, C is <b>obtuse</b> — that is OK! Your calculator handles it.</div>`},
 {h:'Worked example 8',b:`<div class="cols"><div><div class="q"><span class="tag">Worked example</span>Two sides of a triangle are 7 m and 9 m with an included angle of 62°. Find the third side c, to two decimal places.</div></div>
  <div class="center">${G.obl({C:'62°',a:'7 m',b:'9 m',c:'c = ?'})}</div></div>`+steps([
  `<b>Recognise:</b> two sides + included angle = <b>SAS</b> → cosine rule.`,
  `<b>Write:</b> c² = 7² + 9² − 2 × 7 × 9 × cos 62°`,
  `<b>Calculate the pieces:</b> c² = 49 + 81 − 126 cos 62° ≈ 130 − 59.16 = 70.84`,
  `<b>Square root:</b> c = √70.84 ≈ <b>8.42 m</b>`])},
 {h:'Your turn',b:`<div class="cols"><div><div class="q"><span class="tag">Your turn</span>A triangle has sides 5, 7 and 10. Find the largest angle, to one decimal place.</div></div>
  <div class="center">${G.obl({A:'θ = ?',a:'10',b:'5',c:'7'})}</div></div>
  <div class="hint frag">Hint: the largest angle is opposite the longest side (10). cos θ = ${fr('5² + 7² − 10²','2 × 5 × 7')}</div>
  <div class="ans frag">✔ cos θ = −26 ÷ 70 ≈ −0.3714 → θ ≈ <b>111.8°</b> (obtuse, as expected — cos was negative)</div>`},
 {h:'',b:exset('6G',['SAS questions (find a side), then SSS questions (find an angle)','Before each question write “SAS” or “SSS” — decide the rule first','Mixed sine/cosine rule questions at the end'])}
]},
/* ============ L9 6H ============ */
{code:'6H (10A) · Term 3 Week 3 · Lesson 9',nm:'Area of a triangle',menu:['6H','Area of a triangle (10A)','included angle, area rule'],
 slides:[
 title('LESSON 9 — SECTION 6H (10A)','Area of a triangle',['use Area = ½ab sin C','choose the correct included angle','find an angle or side from a known area']),
 {h:'🗣 New words first',b:vocab([
  ['area rule','—','Area = ½ × a × b × sin C'],
  ['included angle','in-KLOO-ded','the angle between sides a and b — the angle C'],
  ['square units','—','area units: m², cm², km²']])},
 {h:'Key idea — the area rule',b:`<div class="center"><span class="formula">Area = ${fr('1','2')} ab sin C</span></div>
  <div class="key frag"><span class="kt">Key idea</span>a and b are two sides; C is the angle <b>between</b> them (the included angle).</div>
  <div class="key frag"><span class="kt">Why it works</span>height = b sin C, and Area = ½ × base × height. Same formula, new clothes!</div>`},
 {h:'Worked example 9',b:`<div class="cols"><div><div class="q"><span class="tag">Worked example</span>Find the area of a triangle with sides 8 cm and 11 cm and included angle 40°, to one decimal place.</div></div>
  <div class="center">${G.obl({C:'40°',a:'8 cm',b:'11 cm'})}</div></div>`+steps([
  `<b>Check:</b> 40° is <b>between</b> the sides 8 and 11 ✔`,
  `<b>Write:</b> Area = ½ × 8 × 11 × sin 40°`,
  `<b>Calculate:</b> Area = 44 × sin 40° ≈ <b>28.3 cm²</b>`])},
 {h:'Your turn',b:`<div class="cols"><div><div class="q"><span class="tag">Your turn</span>A triangle has area 30 m². Two sides are 9 m and 12 m. Find the included angle, to one decimal place.</div></div>
  <div class="center">${G.obl({C:'C = ?',a:'9 m',b:'12 m'})}<p class="note">Area = 30 m²</p></div></div>
  <div class="hint frag">Hint: 30 = ½ × 9 × 12 × sin C → sin C = 30 ÷ 54</div>
  <div class="ans frag">✔ sin C = 0.5556 → C ≈ <b>33.7°</b> <span class="say">(an obtuse answer 146.3° is also possible — the book discusses this)</span></div>`},
 {h:'',b:exset('6H',['Area questions, then “working backwards” questions (find the angle or side)','Include units (cm², m²) in every answer','Finish: mixed questions using sine rule, cosine rule AND area rule — decide first!'])}
]},
/* ============ L10 6I ============ */
{code:'6I (10A) · Term 3 Week 3 · Lesson 10',nm:'The unit circle',menu:['6I','The unit circle (10A)','quadrant, unit circle, sign'],
 slides:[
 title('LESSON 10 — SECTION 6I (10A)','The unit circle',['describe points on the unit circle using cos θ and sin θ','decide the sign (+/−) of sin, cos, tan in each quadrant','rewrite trig values of big angles using acute angles']),
 {h:'🗣 New words first',b:vocab([
  ['unit circle','YOO-nit','a circle with radius 1, centre (0, 0)'],
  ['quadrant','KWOD-rant','one quarter of the plane — numbered 1 to 4, anticlockwise'],
  ['sign','syne (like “sign”)','positive (+) or negative (−) — careful: sounds like “sine”!'],
  ['acute','a-KYOOT','an angle less than 90°']])},
 {h:'Key idea — P(cos θ, sin θ)',b:`<div class="cols"><div>${D.uc}</div><div>
  <div class="key"><span class="kt">Key idea</span>For any angle θ, the point P on the unit circle is<br>P = (cos θ, sin θ).<br><br>So cos θ is the <b>x-coordinate</b> and sin θ is the <b>y-coordinate</b>.</div>
  <div class="key frag"><span class="kt">Signs by quadrant</span>Q1: <b>A</b>ll positive · Q2: <b>S</b>in positive · Q3: <b>T</b>an positive · Q4: <b>C</b>os positive</div></div></div>`},
 {h:'Worked example 10',b:`<div class="q"><span class="tag">Worked example</span>State whether each is positive or negative, then write cos 150° using an acute angle.</div>`+steps([
  `<b>cos 150°:</b> 150° is in Quadrant 2 → only sin is positive → cos 150° is <b>negative</b>.`,
  `<b>sin 220°:</b> 220° is in Quadrant 3 → only tan is positive → sin 220° is <b>negative</b>.`,
  `<b>tan 300°:</b> 300° is in Quadrant 4 → only cos is positive → tan 300° is <b>negative</b>.`,
  `<b>Acute angle:</b> 150° is 30° from 180°, so cos 150° = <b>−cos 30°</b>.`])},
 {h:'Your turn',b:`<div class="q"><span class="tag">Your turn</span>(a) Write sin 160° in terms of an acute angle. (b) Is tan 200° positive or negative?</div>
  <div class="hint frag">Hint: 160° is in Q2 (sin positive); 200° is in Q3 (tan positive).</div>
  <div class="ans frag">✔ (a) sin 160° = <b>sin 20°</b> &nbsp; (b) tan 200° is <b>positive</b></div>`},
 {h:'',b:exset('6I',['Quadrant and sign questions, then rewriting with acute angles','Draw a mini unit circle next to every question','Say each answer aloud: “220 degrees is in quadrant 3, so sine is negative.”'])}
]},
/* ============ L11 6J ============ */
{code:'6J (10A) · Term 3 Week 3 · Lesson 11',nm:'Graphs of trigonometric functions',menu:['6J','Graphs of trig functions (10A)','period, amplitude, cycle, symmetry'],
 slides:[
 title('LESSON 11 — SECTION 6J (10A)','Graphs of trigonometric functions',['sketch y = sin θ and y = cos θ for 0° ≤ θ ≤ 360°','read solutions from a graph','use graph symmetry to find matching angles']),
 {h:'🗣 New words first',b:vocab([
  ['cycle','SY-kul','one complete wave pattern'],
  ['period','PEER-ee-od','how many degrees one cycle takes — 360° for sin and cos'],
  ['amplitude','AM-pli-tyood','height from the middle to the top — 1 for sin θ and cos θ'],
  ['symmetry','SIM-e-tree','the graph looks the same when reflected']])},
 {h:'Key idea — the sine graph',b:`<div class="center">${D.sin}</div>
  <div class="key frag"><span class="kt">Read the graph</span>sin θ is the <b>y-coordinate</b> of P on the unit circle. Max = 1 at 90°, min = −1 at 270°, zero at 0°, 180°, 360°.</div>`},
 {h:'Key idea — the cosine graph',b:`<div class="center">${D.cos}</div>
  <div class="key frag"><span class="kt">Compare</span>cos θ starts at 1. Zero at 90° and 270°. Min = −1 at 180°. Same shape as sine, shifted 90°.</div>`},
 {h:'Worked example 11',b:`<div class="q"><span class="tag">Worked example</span>Use the graph of y = sin θ to find both solutions of sin θ = 0.5 for 0° ≤ θ ≤ 360°.</div>`+steps([
  `<b>Draw</b> the horizontal line y = 0.5 across the sine graph.`,
  `<b>First crossing:</b> θ = 30°.`,
  `<b>Symmetry:</b> the second crossing is at 180° − 30° = <b>150°</b>.`,
  `<b>Check:</b> both are in quadrants where sin is positive (Q1 and Q2) ✔`])},
 {h:'Your turn',b:`<div class="q"><span class="tag">Your turn</span>(a) For 0° ≤ θ ≤ 360°, when does cos θ = −1? (b) How many solutions does sin θ = 0.8 have on this interval?</div>
  <div class="hint frag">Hint: look at the graphs above.</div>
  <div class="ans frag">✔ (a) θ = <b>180°</b> &nbsp; (b) <b>two</b> solutions (one in Q1, one in Q2)</div>`},
 {h:'',b:exset('6J',['Sketching and reading trig graphs','Use pencil — graphs should be smooth waves, not zig-zags','Desmos check: type y = sin(x) with degrees mode on'])}
]},
/* ============ L12 6K ============ */
{code:'6K (10A) · Term 3 Week 3 · Lesson 12',nm:'Exact values and solving trigonometric equations',menu:['6K','Exact values & trig equations (10A)','exact value, special triangles, surd'],
 slides:[
 title('LESSON 12 — SECTION 6K (10A)','Exact values and solving trigonometric equations',['use the two special triangles for exact values','recall sin, cos, tan of 30°, 45°, 60°','solve simple trig equations for 0° ≤ θ ≤ 360°']),
 {h:'🗣 New words first',b:vocab([
  ['exact value','eg-ZAKT','the true value with surds — no rounding! e.g. √3⁄2, not 0.866…'],
  ['special triangles','—','the 45°–45° triangle and the 30°–60° triangle'],
  ['surd','serd','a root that is irrational, like √2 and √3 (from Chapter 4)'],
  ['solve for θ','—','find ALL angles that make the equation true']])},
 {h:'Key idea — two special triangles',b:`<div class="center">${D.spec}</div>
  <div class="key frag"><span class="kt">Exact value table</span>
  sin 30° = ${fr('1','2')} · sin 45° = ${fr('1','√2')} · sin 60° = ${fr('√3','2')} &nbsp;|&nbsp;
  cos 30° = ${fr('√3','2')} · cos 45° = ${fr('1','√2')} · cos 60° = ${fr('1','2')} &nbsp;|&nbsp;
  tan 30° = ${fr('1','√3')} · tan 45° = 1 · tan 60° = √3</div>`},
 {h:'Worked example 12',b:`<div class="q"><span class="tag">Worked example</span>Solve sin θ = ${fr('1','2')} for 0° ≤ θ ≤ 360°.</div>`+steps([
  `<b>Reference angle:</b> sin 30° = ½, so the acute angle is 30°.`,
  `<b>Where is sin positive?</b> Quadrants 1 and 2.`,
  `<b>Q1 solution:</b> θ = 30°.`,
  `<b>Q2 solution:</b> θ = 180° − 30° = 150°.`,
  `<b>Answer:</b> θ = <b>30° or 150°</b>`])},
 {h:'Your turn',b:`<div class="q"><span class="tag">Your turn</span>Solve tan θ = 1 for 0° ≤ θ ≤ 360°.</div>
  <div class="hint frag">Hint: tan 45° = 1. Tan is positive in Q1 and Q3.</div>
  <div class="ans frag">✔ θ = 45° (Q1) or θ = 180° + 45° = <b>225°</b> (Q3)</div>`},
 {h:'',b:exset('6K',['Exact value questions first — no calculator!','Then solving equations: give ALL solutions in the interval','Make a poster/flashcard of the exact value table for revision'])}
]},

/* ---------- engine ---------- */
let li=0,si=0;
const menuEl=document.getElementById('menu'),stage=document.getElementById('stage'),
      slideEl=document.getElementById('slide'),fill=document.getElementById('fill'),
      hlbl=document.getElementById('hlbl'),pgs=document.getElementById('pgs');
const WEEKS=[['Term 3 · Week 1 — Right-angled trigonometry',[0,1,2,3]],
             ['Term 3 · Week 2 — Bearings, 3D and non-right triangles',[4,5,6,7]],
             ['Term 3 · Week 3 — Area rule, unit circle, graphs, exact values',[8,9,10,11]],
             ['Term 3 · Week 4 — Consolidate, revise, prepare for CAT 1',[12,13,14,15]]];
function buildMenu(){
  let h=`<p style="margin-bottom:10px"><a href="index.html" style="color:var(--navy);font-weight:600;text-decoration:none">⌂ Course home</a></p>
  <h1>Chapter 6 — Trigonometry</h1>
  <p class="sub">10 Methods · Unit 5 · Essential Mathematics VIC 10 &amp; 10A (3rd ed.) · Term 3 Weeks 1–4 · CAT 1 in Week 5<br>
  <b>ESL routine every lesson:</b> new words first → key idea → worked example → your turn → textbook exercise.</p>`;
  for(const [wn,ids] of WEEKS){
    h+=`<div class="wk"><h2>${wn}</h2><div class="cards">`;
    for(const id of ids){const L=LESSONS[id];
      h+=`<div class="card ${L.cls||''}" onclick="openLesson(${id})">
      <div class="code">Lesson ${id+1} · ${L.menu[0]}</div><div class="nm">${L.menu[1]}</div>
      <div class="vb">🗣 ${L.menu[2]}</div></div>`;}
    h+=`</div></div>`;}
  menuEl.innerHTML=h;
}
function openLesson(i){li=i;si=0;menuEl.style.display='none';stage.style.display='flex';render();}
function goMenu(){stage.style.display='none';menuEl.style.display='block';}
function render(){
  const L=LESSONS[li],S=L.slides[si];
  slideEl.innerHTML=(S.h?`<h2 class="stitle">${S.h}</h2>`:'')+S.b;
  for(const [id,fn] of [['sc',Math.sin],['cc',Math.cos]]){
    const el=document.getElementById(id);
    if(el){let d='M 40 '+(110-85*fn(0)).toFixed(1);
      for(let t=3;t<=360;t+=3)d+=' L '+(40+t*1.222).toFixed(1)+' '+(110-85*fn(t*Math.PI/180)).toFixed(1);
      el.setAttribute('d',d);}
  }
  slideEl.scrollTop=0;
  hlbl.textContent=`${L.code} — ${L.nm}`;
  pgs.textContent=`Slide ${si+1} / ${L.slides.length}`;
  fill.style.width=((si+1)/L.slides.length*100)+'%';
}
function frags(){return [...slideEl.querySelectorAll('.frag')];}
function nav(dir){
  if(dir>0){const f=frags().find(x=>!x.classList.contains('on'));
    if(f){f.classList.add('on');return;}
    if(si<LESSONS[li].slides.length-1){si++;render();}
    else if(li<LESSONS.length-1){openLesson(li+1);}
    else goMenu();
  }else{const on=frags().filter(x=>x.classList.contains('on'));
    if(on.length){on[on.length-1].classList.remove('on');return;}
    if(si>0){si--;render();frags().forEach(x=>x.classList.add('on'));}
    else goMenu();
  }
}
document.addEventListener('keydown',e=>{
  if(stage.style.display!=='flex')return;
  if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){e.preventDefault();nav(1);}
  if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();nav(-1);}
  if(e.key==='Escape')goMenu();
});
buildMenu();
</script>
</body>
